<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbit</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap');

    :root {
      --cream: #f5f0e8;
      --dark: #0a0a0f;
      --accent: #c8a96e;
      --muted: rgba(245, 240, 232, 0.55);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* ── Video stage ── */
    #video-stage {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh; z-index: 0;
    }

    #bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    #video-stage::after {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 40%, rgba(10,10,15,0.5) 100%),
        linear-gradient(to bottom, rgba(10,10,15,0.3) 0%, transparent 15%, transparent 80%, rgba(10,10,15,0.7) 100%);
      pointer-events: none;
    }

    /* ── Progress bar ── */
    #progress-bar {
      position: fixed; top: 0; left: 0;
      height: 2px; width: 0%;
      background: linear-gradient(90deg, var(--accent), #e8d5a3);
      z-index: 100; transition: width 0.05s linear;
    }

    /* ── HUD ── */
    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 50; }

    #hud-bar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center;
      gap: 2.5rem;
      padding: 2rem 3rem;
      background: rgba(10,10,15,0);
      backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
      border-bottom: 1px solid rgba(200,169,110,0);
      transition: background 0.4s ease, backdrop-filter 0.4s ease, border-color 0.4s ease;
      pointer-events: all;
    }

    .caption-top { margin-left: auto; }

    #hud-bar.scrolled {
      background: rgba(10,10,15,0.6);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom-color: rgba(200,169,110,0.1);
    }

    .hud-nav {
      display: flex; align-items: center;
      gap: 0.75rem; pointer-events: all;
    }

    .hud-nav a {
      display: flex; align-items: center;
      gap: 0.5rem;
      font-size: 0.58rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
      text-decoration: none; transition: color 0.2s;
      padding: 0.3rem 0;
    }

    .hud-nav a:hover { color: var(--accent); }

    .hud-nav a svg {
      width: 12px; height: 12px;
      stroke: currentColor; fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    .hud-nav-sep {
      width: 1px; height: 12px;
      background: rgba(200,169,110,0.2);
    }

    .hud-nav-index {
      font-size: 0.55rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(200,169,110,0.4);
      text-decoration: none; transition: color 0.2s;
      pointer-events: all;
    }

    .hud-nav-index:hover { color: var(--accent); }

    .wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      letter-spacing: 0.18em; color: var(--cream); opacity: 0.9;
    }

    .caption-top {
      font-size: 0.68rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--muted);
    }

    #progress-pct {
      position: absolute; bottom: 2.8rem; right: 3rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: 0.18em;
      color: var(--accent); opacity: 0.85;
    }

    #scroll-cue {
      position: absolute; bottom: 2.8rem; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      transition: opacity 0.4s ease;
    }

    #scroll-cue span {
      font-size: 0.62rem; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--muted);
    }

    .scroll-arrow {
      width: 18px; height: 18px;
      border-right: 1.5px solid var(--accent);
      border-bottom: 1.5px solid var(--accent);
      transform: rotate(45deg);
      animation: bounce 1.6s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translate(0,0); opacity: 1; }
      50%       { transform: rotate(45deg) translate(4px,4px); opacity: 0.5; }
    }

    /* ── Layout ── */
    #scroll-content { position: relative; z-index: 10; }

    #hero {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
    }

    #hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 14vw, 12rem);
      line-height: 0.9; letter-spacing: 0.04em; color: var(--cream);
      position: relative;
    }

    #hero h1::before {
      content: attr(data-text);
      position: absolute; inset: 0;
      color: rgba(0,0,0,.75);
      filter: blur(10px) brightness(0);
      opacity: 1;
      transform: translateY(6px) scaleY(0.98);
      z-index: -1; pointer-events: none;
    }

    #hero p {
      margin-top: 1.2rem;
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent);
      background: rgba(10,10,15,0.5);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 0.45rem 1.2rem; border-radius: 1px;
    }

    .content-section { padding: 7rem 0; }

    .section-inner { max-width: 1000px; margin: 0 auto; padding: 0 3rem; }

    .text-block {
      background: rgba(10,10,15,0.55);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(200,169,110,0.12);
      border-radius: 2px; padding: 3.5rem 4rem;
    }

    .section-label {
      font-size: 0.65rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem;
    }

    .section-inner h2, .timeline-header h2, .gallery-header h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 7vw, 6rem);
      line-height: 0.92; letter-spacing: 0.04em;
      color: var(--cream); margin-bottom: 2.5rem;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3rem; margin-top: 3rem; }

    .content-section p, .timeline-content p {
      font-size: 1rem; line-height: 1.85; color: var(--muted); font-weight: 300;
    }

    .card { border-top: 1px solid rgba(200,169,110,0.25); padding-top: 2rem; }

    .card h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem; letter-spacing: 0.08em;
      color: var(--cream); margin-bottom: 1rem;
    }

    /* ── Stats ── */
    .stat-row {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 2rem; margin-top: 3rem;
      border-top: 1px solid rgba(200,169,110,0.12); padding-top: 3rem;
    }

    .stat { display: flex; flex-direction: column; align-items: flex-start; gap: 0.75rem; }

    .stat-icon { width: 48px; height: 48px; margin-bottom: 0.25rem; }

    .stat-icon svg { width: 100%; height: 100%; overflow: visible; }

    .stat-icon svg path, .stat-icon svg circle, .stat-icon svg line, .stat-icon svg polyline {
      fill: none; stroke: var(--accent); stroke-width: 1.5;
      stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: var(--dash-len, 200);
      stroke-dashoffset: var(--dash-len, 200);
      transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stat.fired .stat-icon svg path,
    .stat.fired .stat-icon svg circle,
    .stat.fired .stat-icon svg line,
    .stat.fired .stat-icon svg polyline { stroke-dashoffset: 0; }

    .stat h4 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      color: var(--accent); letter-spacing: 0.04em; line-height: 1;
      opacity: 0; transition: opacity 0.4s ease 0.5s;
    }

    .stat.fired h4 { opacity: 1; }

    .stat p {
      font-size: 0.72rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted); margin-top: 0.1rem;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.4s ease 0.7s, transform 0.4s ease 0.7s;
    }

    .stat.fired p { opacity: 1; transform: translateY(0); }

    /* ── Text + Image ── */
    .text-image-right, .text-image-left {
      display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center;
    }

    .text-image-right .ti-text h2,
    .text-image-left .ti-text h2 { margin-bottom: 1.5rem; }

    .text-image-right .ti-image img,
    .text-image-left .ti-image img {
      width: 100%; aspect-ratio: 3/4;
      object-fit: cover; border-radius: 2px; display: block;
    }

    .text-image-left .ti-image { order: -1; }

    /* ── Fullbleed ── */
    .section-fullbleed { padding: 7rem 0; }

    .fullbleed-wrap { position: relative; max-width: 1100px; margin: 0 auto; padding: 0 3rem; }

    .fullbleed-wrap img {
      width: 100%; max-height: 85vh;
      object-fit: cover; display: block; border-radius: 2px;
    }

    .fullbleed-caption {
      position: absolute; bottom: 1rem; right: 3.75rem;
      font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(245,240,232,0.5);
      background: rgba(10,10,15,0.5); backdrop-filter: blur(6px);
      padding: 0.4rem 0.8rem; border-radius: 1px;
    }

    /* ── Pull quote ── */
    .pull-quote { padding: 0.5rem 0; max-width: 900px; margin: 0 auto; }

    .pull-quote blockquote {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.05; letter-spacing: 0.03em; color: var(--cream);
      border-left: 2px solid var(--accent); padding-left: 2.5rem;
    }

    .pull-quote cite {
      display: block; margin-top: 1.5rem; padding-left: 2.5rem;
      font-size: 0.68rem; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--accent); font-style: normal;
    }

    /* ── Gallery ── */
    .gallery-section { padding: 7rem 0; }

    .gallery-inner { max-width: 1200px; margin: 0 auto; padding: 0 3rem; }

    .gallery-header { margin-bottom: 2.5rem; }

    .gallery-label {
      font-size: 0.65rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem;
    }

    .gallery-grid { columns: 3; column-gap: 0.75rem; }

    .gallery-item {
      break-inside: avoid; margin-bottom: 0.75rem;
      position: relative; overflow: hidden; cursor: pointer;
    }

    .gallery-item img { width: 100%; display: block; transition: transform 0.5s ease; }
    .gallery-item:hover img { transform: scale(1.03); }

    .gallery-item::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(10,10,15,0); transition: background 0.3s ease;
    }

    .gallery-item:hover::after { background: rgba(10,10,15,0.25); }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(10,10,15,0.95); backdrop-filter: blur(16px);
      display: none; align-items: center; justify-content: center;
    }

    #lightbox.open { display: flex; }

    #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 2px; }

    #lightbox-close {
      position: absolute; top: 2rem; right: 2.5rem;
      font-size: 1.5rem; color: var(--muted);
      cursor: pointer; background: none; border: none; line-height: 1; transition: color 0.2s;
    }

    #lightbox-close:hover { color: var(--cream); }

    #lightbox-prev, #lightbox-next {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: 1px solid rgba(200,169,110,0.2);
      color: var(--accent); font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.15em;
      padding: 0.6rem 1rem; cursor: pointer; transition: border-color 0.2s; border-radius: 1px;
    }

    #lightbox-prev { left: 2rem; }
    #lightbox-next { right: 2rem; }
    #lightbox-prev:hover, #lightbox-next:hover { border-color: var(--accent); color: var(--cream); }

    #lightbox-count {
      position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
      font-size: 0.65rem; letter-spacing: 0.22em; color: var(--muted);
    }

    /* ── Timeline ── */
    .timeline-section { padding: 7rem 0; }

    .timeline-inner { max-width: 1100px; margin: 0 auto; padding: 0 3rem; }

    .timeline-header { margin-bottom: 4rem; }

    .timeline-track { display: grid; grid-template-columns: 60px 1fr; gap: 0 2.5rem; }

    .timeline-spine { display: flex; flex-direction: column; align-items: center; }

    .timeline-node {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1.5px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem;
      letter-spacing: 0.1em; color: var(--accent); flex-shrink: 0;
      background: rgba(10,10,15,0.8); backdrop-filter: blur(4px);
    }

    .timeline-line {
      width: 1px; flex: 1; min-height: 3rem;
      background: linear-gradient(to bottom, rgba(200,169,110,0.3), rgba(200,169,110,0.05));
      margin: 0.5rem 0;
    }

    .timeline-content { padding-bottom: 4rem; }

    .timeline-content h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      letter-spacing: 0.06em; color: var(--cream);
      line-height: 1; margin-bottom: 1rem; margin-top: 0.4rem;
    }

    .timeline-content .step-image { margin-top: 1.5rem; max-width: 580px; }
    .timeline-content .step-image img { width: 100%; border-radius: 2px; display: block; }

    /* ── Footer ── */
    footer {
      background: rgba(10,10,15,0.75);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(200,169,110,0.12);
      padding: 5rem 3rem; text-align: center;
      position: relative; z-index: 10;
    }

    footer .footer-wordmark {
      display: block; font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem; letter-spacing: 0.18em;
      color: var(--cream); opacity: 0.15; margin-bottom: 1rem;
    }

    footer p {
      font-size: 0.68rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--muted);
    }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0; background: var(--dark);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem; z-index: 200; transition: opacity 0.6s ease;
    }

    #loading.hidden { opacity: 0; pointer-events: none; }

    .loading-ring {
      width: 48px; height: 48px;
      border: 1.5px solid rgba(200,169,110,0.2);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading span {
      font-size: 0.65rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--muted);
    }

    /* ── Annotated / Badge diagram section ── */
    .annotated-section { padding: 7rem 0; }

    .annotated-inner { max-width: 1100px; margin: 0 auto; padding: 0 3rem; }

    .annotated-block {
      background: rgba(10,10,15,0.52);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(200,169,110,0.1);
      border-radius: 2px;
      padding: 3.5rem 4rem 4rem;
      position: relative;
      overflow: hidden;
    }

    .badge-ghost {
      position: absolute; right: -4%; top: 50%;
      transform: translateY(-50%); width: 52%;
      opacity: 0.05; mix-blend-mode: screen;
      pointer-events: none; user-select: none;
    }

    .badge-ghost img { width: 100%; height: auto; display: block; }

    .annotated-label {
      font-size: 0.65rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 3rem;
    }

    .annotated-diagram { display: flex; align-items: flex-start; gap: 3rem; }

    .badge-svg-wrap { position: relative; flex: 0 0 42%; max-width: 320px; }

    .badge-svg-wrap svg.badge-svg {
      width: 100%; height: auto; display: block;
      filter: drop-shadow(0 0 50px rgba(200,169,110,0.08));
    }

    .callout-list {
      flex: 1; display: flex; flex-direction: column;
      gap: 1.8rem; padding-right: 4rem; min-width: 0;
    }

    .callout-float {
      opacity: 0; transform: translateX(8px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .callout-float.visible { opacity: 1; transform: translateX(0); }

    .callout-float-label {
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem; letter-spacing: 0.36em;
      color: rgb(200,169,110); line-height: 1.1;
      margin-bottom: 0.3rem; text-transform: uppercase;
    }

    .callout-float-desc { font-size: 0.88rem; line-height: 1.65; color: rgba(245,240,232,0.45); }

    .badge-svg .draw-stroke {
      fill: none; stroke: #f5f0e8;
      stroke-dasharray: var(--dl, 2000);
      stroke-dashoffset: var(--dl, 2000);
      transition: stroke-dashoffset 0.9s cubic-bezier(0.4, 0, 0.2, 1);
      transition-delay: var(--dd, 0s);
    }

    .badge-svg .draw-fill {
      opacity: 0; transition: opacity 0.7s ease;
      transition-delay: var(--dd, 0s);
    }

    .badge-svg.drawn .draw-stroke { stroke-dashoffset: 0; }
    .badge-svg.drawn .draw-fill   { opacity: 1; }

    .badge-svg g[data-highlight-group] {
      transition: opacity 0.3s ease, filter 0.3s ease;
    }

    /* ── Panel sections ── */
    .panel-section { padding: 7rem 0; position: relative; z-index: 10; }

    .panel-inner { max-width: 1100px; margin: 0 auto; padding: 0 3rem; }

    .panel-label {
      font-size: 0.65rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--accent);
      display: block; margin-bottom: 1.2rem;
    }

    .panel-heading {
      font-family: 'Bebas Neue', sans-serif;
      line-height: 0.92; letter-spacing: 0.04em; color: var(--cream);
    }

    .panel-body { font-size: 1rem; line-height: 1.85; color: var(--muted); font-weight: 300; }

    .panel-rule {
      border: none; border-top: 1px solid rgba(245,240,232,0.12); margin: 4rem 0;
    }

    /* Panel A — Royal Navy */
    .rn-panel .panel-heading { font-size: clamp(3rem, 7vw, 6rem); margin-bottom: 2rem; }
    .rn-panel .panel-body    { max-width: 68ch; margin-bottom: 4rem; }

    .rn-badge-primary  { display: flex; justify-content: center; padding: 0 60px; }
    .rn-badge-primary img  { width: 100%; max-width: 520px; height: auto; display: block; }

    .rn-symmetry-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; letter-spacing: 0.1em;
      color: var(--cream); text-align: center;
      display: block; margin-bottom: 1rem;
    }

    .rn-symmetry-caption {
      font-size: 0.85rem; font-weight: 300;
      color: var(--muted); text-align: center;
      display: block; margin-bottom: 3rem;
    }

    .rn-badge-secondary { display: flex; justify-content: center; padding: 0 120px; }
    .rn-badge-secondary img { width: 100%; max-width: 360px; height: auto; display: block; }

    /* Panel B — SBS */
    .sbs-panel .panel-heading { font-size: clamp(3rem, 7vw, 6rem); margin-bottom: 3rem; }

    .sbs-image-wrap { width: 100%; margin-bottom: 2.5rem; }
    .sbs-image-wrap img { width: 100%; height: auto; display: block; }

    .sbs-captions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; }

    .sbs-caption-col {
      display: flex; flex-direction: column;
      align-items: center; gap: 0.6rem; padding: 0 1rem;
    }

    .sbs-caption-col__label {
      font-size: 0.65rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--accent); text-align: center;
    }

    .sbs-caption-col__text {
      font-size: 0.9rem; font-weight: 300;
      color: var(--muted); text-align: center; line-height: 1.55;
    }

    /* Panel C — HQCOMFOR */
    .hq-intro {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 4rem; align-items: start; margin-bottom: 5rem;
    }

    .hq-intro-text { display: flex; flex-direction: column; }
    .hq-intro-text .panel-heading { font-size: clamp(2.5rem, 5vw, 5rem); margin-bottom: 1.5rem; }

    .hq-intro-badge { display: flex; justify-content: center; }
    .hq-intro-badge img { width: 100%; max-width: 320px; height: auto; display: block; }

    .hq-section-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; letter-spacing: 0.1em;
      color: var(--cream); text-align: center; margin-bottom: 3rem;
    }

    .hq-row { display: grid; grid-template-columns: repeat(3,1fr); margin-bottom: 5rem; }

    .hq-item { display: flex; flex-direction: column; align-items: center; }

    .hq-item__image-wrap { display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; }

    .hq-components .hq-item__image-wrap { height: 200px; }
    .hq-components .hq-item__image-wrap img { max-height: 180px; max-width: 90px; width: auto; height: auto; display: block; }

    .hq-colourways .hq-item__image-wrap { height: 175px; }
    .hq-colourways .hq-item__image-wrap img { max-height: 155px; max-width: 155px; width: auto; height: auto; display: block; }

    .hq-item__label {
      font-size: 0.65rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--muted); text-align: center;
    }

    .hq-palette { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .hq-palette__dots { display: flex; gap: 0.6rem; }

    .palette-dot { width: 28px; height: 28px; border-radius: 50%; display: block; }
    /* Edit to match actual palette */
    .dot-1 { background: #e05a38; }
    .dot-2 { background: #2e7d4e; }
    .dot-3 { background: #3d5faa; }
    .dot-4 { background: #60b8d4; }

    .hq-palette__label {
      font-size: 0.65rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: rgba(245,240,232,0.32);
    }

    /* Panel D — Software */
    .sw-panel { display: flex; flex-direction: column; align-items: center; gap: 3rem; }

    .sw-panel__label {
      font-size: 0.65rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--accent);
    }

    .sw-panel__logos {
      width: 100%; display: flex;
      justify-content: space-evenly; align-items: center;
      flex-wrap: wrap; gap: 2rem 0;
    }

    .sw-logo { display: flex; align-items: center; gap: 0.7rem; }

    .sw-logo__icon {
      height: 26px; width: auto; display: block;
      filter: brightness(0) invert(1); opacity: 0.85;

    .sw-logo__name {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.25rem; font-weight: 400;
      color: var(--cream); letter-spacing: 0.01em;
      white-space: nowrap; opacity: 0.85;

    .sw-panel__caption {
      font-size: 0.9rem; font-weight: 300;
      color: var(--muted); text-align: center;
      max-width: 68ch; line-height: 1.65;
    }

    /* ── Panel image / logo reveals ── */
    .panel-section img {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .sw-logo {
      opacity: 0;
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .panel-section img.visible,
    .sw-logo.visible { opacity: 1; transform: translateY(0); }

    /* ── Scroll reveal ── */
    .reveal {
      opacity: 0; transform: translateY(28px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }

    .reveal.visible { opacity: 1; transform: translateY(0); }

    .gallery-item.reveal { transition-duration: 0.6s; }
    .gallery-item.reveal:nth-child(2) { transition-delay: 0.08s; }
    .gallery-item.reveal:nth-child(3) { transition-delay: 0.16s; }
    .gallery-item.reveal:nth-child(4) { transition-delay: 0.06s; }
    .gallery-item.reveal:nth-child(5) { transition-delay: 0.14s; }
    .gallery-item.reveal:nth-child(6) { transition-delay: 0.22s; }
    .gallery-item.reveal:nth-child(7) { transition-delay: 0.04s; }
    .gallery-item.reveal:nth-child(8) { transition-delay: 0.12s; }
    .gallery-item.reveal:nth-child(9) { transition-delay: 0.20s; }

    .timeline-content.reveal:nth-child(4)  { transition-delay: 0.10s; }
    .timeline-content.reveal:nth-child(6)  { transition-delay: 0.15s; }
    .timeline-content.reveal:nth-child(8)  { transition-delay: 0.20s; }
    .timeline-content.reveal:nth-child(10) { transition-delay: 0.25s; }

    /* ════════════════════════════════════════════
       RESPONSIVE — Tablet  ≤ 900px
    ════════════════════════════════════════════ */
    @media (max-width: 900px) {
      /* HUD */
      .caption-top { display: none; }
      #hud-bar { padding: 1.5rem 2rem; gap: 1.5rem; }
      #progress-pct { bottom: 1.5rem; right: 1.5rem; }

      /* Sections */
      .content-section { padding: 5rem 0; }
      .section-inner { padding: 0 2rem; }
      .text-block { padding: 2.5rem 2rem; }

      /* Grids → single column */
      .two-col { grid-template-columns: 1fr; gap: 2rem; }
      .three-col { grid-template-columns: 1fr; }

      /* Text+Image: stack, image below text */
      .text-image-right,
      .text-image-left { grid-template-columns: 1fr; gap: 2rem; }

      /* Both variants: image always goes after text on mobile */
      .text-image-right .ti-image,
      .text-image-left .ti-image { order: 1; }
      .text-image-right .ti-text,
      .text-image-left .ti-text  { order: 0; }

      /* Image fills width at tablet */
      .text-image-right .ti-image img,
      .text-image-left .ti-image img { aspect-ratio: 4/3; }

      /* Fullbleed */
      .fullbleed-wrap { padding: 0 1rem; }
      .fullbleed-wrap img { max-height: 60vh; }

      /* Timeline */
      .timeline-inner { padding: 0 2rem; }
      .timeline-track { grid-template-columns: 48px 1fr; gap: 0 1.5rem; }
      .timeline-content .step-image { max-width: 100%; }

      /* Gallery → 2 col */
      .gallery-grid { columns: 2; }
      .gallery-inner { padding: 0 2rem; }

      /* Stats → 2 col */
      .stat-row { grid-template-columns: repeat(2,1fr); }

      /* Pull quote */
      .pull-quote { padding: 0; }
      .pull-quote blockquote { padding-left: 1.5rem; }
      .pull-quote cite { padding-left: 1.5rem; }

      /* Annotated */
      .annotated-inner { padding: 0 2rem; }
      .annotated-block { padding: 2.5rem 2rem; }
      .annotated-diagram { flex-direction: column; }
      .badge-svg-wrap { flex: none; width: 70%; max-width: none; margin: 0 auto; }
      .callout-list { padding-right: 0; }
      .callout-float { opacity: 1; transform: none; }

      /* Panels */
      .hq-intro { grid-template-columns: 1fr; gap: 2.5rem; }
      .hq-intro-badge { justify-content: flex-start; }
      .hq-row { grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-bottom: 3rem; }
      .sbs-captions { grid-template-columns: 1fr; gap: 1.5rem; }
      .rn-badge-primary { padding: 0 20px; }
      .rn-badge-secondary { padding: 0 40px; }
    }

    /* ════════════════════════════════════════════
       RESPONSIVE — Mobile  ≤ 540px
    ════════════════════════════════════════════ */
    @media (max-width: 540px) {
      /* HUD — tighten further */
      #hud-bar { padding: 1.2rem 1.2rem; gap: 1rem; }
      .wordmark { font-size: 1.2rem; }
      .hud-nav a { font-size: 0.5rem; letter-spacing: 0.12em; }

      /* Hero */
      #hero h1 { font-size: clamp(3.5rem, 16vw, 6rem); }
      #hero p { font-size: 0.68rem; letter-spacing: 0.2em; padding: 0.4rem 0.9rem; }

      /* Sections */
      .content-section { padding: 4rem 0; }
      .section-inner { padding: 0 1.2rem; }
      .text-block { padding: 2rem 1.5rem; }

      /* Images edge-to-edge on mobile */
      .text-image-right .ti-image img,
      .text-image-left .ti-image img {
        aspect-ratio: 16/9;
        border-radius: 0;
        margin: 0 -1.5rem;
        width: calc(100% + 3rem);
      }

      /* Fullbleed truly full-bleed */
      .fullbleed-wrap { padding: 0; }
      .fullbleed-wrap img { border-radius: 0; max-height: 50vh; }
      .fullbleed-caption { right: 0.75rem; bottom: 0.75rem; }

      /* Timeline spine — tighten */
      .timeline-inner { padding: 0 1.2rem; }
      .timeline-track { grid-template-columns: 40px 1fr; gap: 0 1rem; }
      .timeline-node { width: 30px; height: 30px; font-size: 0.7rem; }

      /* Gallery → 1 col */
      .gallery-grid { columns: 1; }
      .gallery-inner { padding: 0 1.2rem; }
      .gallery-section { padding: 4rem 0; }

      /* Stats → 1 col */
      .stat-row { grid-template-columns: 1fr; }

      /* Annotated */
      .annotated-inner { padding: 0 1.2rem; }
      .annotated-block { padding: 2rem 1.5rem; }
      .badge-svg-wrap { width: 90%; }
      .callout-list { gap: 1.2rem; }
      .badge-ghost { display: none; }

      /* Panels */
      .hq-row { grid-template-columns: 1fr; }
      .hq-components .hq-item__image-wrap { height: auto; padding: 1rem 0; }
      .hq-colourways .hq-item__image-wrap { height: auto; padding: 1rem 0; }
      .sbs-captions { grid-template-columns: 1fr; gap: 1.2rem; }
      .rn-badge-primary { padding: 0; }

      .sw-panel__logos { gap: 1.5rem 0; justify-content: center; }

      /* Pull quote */
      .pull-quote blockquote { font-size: clamp(1.8rem, 7vw, 2.5rem); padding-left: 1.2rem; }
      .pull-quote cite { padding-left: 1.2rem; }

      /* Footer */

      /* Lightbox nav — easier to tap */
      #lightbox-prev { left: 0.75rem; padding: 0.5rem 0.75rem; }
      #lightbox-next { right: 0.75rem; padding: 0.5rem 0.75rem; }
    }
  </style>

  <script>
  /* ── Helpers ── */
  function el(tag, cls, html) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  }

  function mkImg(src, alt) {
    const i = document.createElement('img');
    i.src = src; i.alt = alt || ''; i.loading = 'lazy';
    return i;
  }

  /* ── Identity ── */
  document.title = CONFIG.title;
  document.getElementById('hud-wordmark').textContent = CONFIG.wordmark;
  document.getElementById('hud-caption').textContent  = CONFIG.caption;
  document.getElementById('bg-video').src             = CONFIG.video;

  /* ── HUD navigation ── */
  const hudNav = document.getElementById('hud-nav');
  const n = CONFIG.nav;

  function navSep() {
    const sep = document.createElement('span');
    sep.className = 'hud-nav-sep';
    hudNav.appendChild(sep);
  }

  if (n.prev && n.prev.url) {
    const a = document.createElement('a');
    a.href = n.prev.url;
    a.innerHTML = `<svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>${n.prev.label}`;
    hudNav.appendChild(a);
    navSep();
  }

  if (n.index) {
    const idx = document.createElement('a');
    idx.href = n.index;
    idx.className = 'hud-nav-index';
    idx.textContent = 'All Work';
    hudNav.appendChild(idx);
  }

  if (n.next && n.next.url) {
    navSep();
    const a = document.createElement('a');
    a.href = n.next.url;
    a.innerHTML = `${n.next.label}<svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
    hudNav.appendChild(a);
  }

  const heroTitle = document.getElementById('hero-title');
  const heroText = CONFIG.heroLine2
    ? CONFIG.heroLine1 + '\n' + CONFIG.heroLine2
    : CONFIG.heroLine1;
  heroTitle.innerHTML = CONFIG.heroLine2
    ? CONFIG.heroLine1 + '<br>' + CONFIG.heroLine2
    : CONFIG.heroLine1;
  heroTitle.setAttribute('data-text', heroText);
  document.getElementById('hero-sub').textContent = CONFIG.heroSub;

  /* ── Section builders ── */
  const main = document.getElementById('scroll-content');

  function appendSection(inner, sectionCls) {
    const s  = el('section', sectionCls || 'content-section');
    const si = el('div', 'section-inner');
    si.appendChild(inner);
    s.appendChild(si);
    main.appendChild(s);
  }

  function makeTextBlock(children, showChapter, chapterText) {
    const tb = el('div', 'text-block');
    if (showChapter && chapterText) tb.appendChild(el('p', 'section-label', chapterText));
    children.forEach(c => tb.appendChild(c));
    return tb;
  }

  /* Pull quote */
  if (CONFIG.sections.pullQuote) {
    const pq = el('div', 'pull-quote');
    pq.appendChild(el('blockquote', '', CONFIG.content.pullQuote));
    pq.appendChild(el('cite', '', CONFIG.content.pullQuoteCite));
    appendSection(makeTextBlock([pq]));
  }

  /* Intro */
  if (CONFIG.sections.intro) {
    const c  = CONFIG.content.intro;
    const tc = el('div', 'two-col');
    tc.appendChild(el('h2', '', c.heading));
    tc.appendChild(el('p', '', c.body));
    appendSection(makeTextBlock([tc], c.showChapter, c.chapter));
  }

  /* Text + image right */
  if (CONFIG.sections.textImageR) {
    const c  = CONFIG.content.textImageR;
    const ti = el('div', 'text-image-right');
    const tt = el('div', 'ti-text');
    tt.appendChild(el('h2', '', c.heading));
    tt.appendChild(el('p', '', c.body));
    const td = el('div', 'ti-image');
    td.appendChild(mkImg(c.image, c.imageAlt));
    ti.appendChild(tt); ti.appendChild(td);
    appendSection(makeTextBlock([ti], c.showChapter, c.chapter));
  }

  /* Full width image */
  if (CONFIG.sections.fullbleed) {
    const c  = CONFIG.content.fullbleed;
    const s  = el('section', 'content-section section-fullbleed');
    const fw = el('div', 'fullbleed-wrap');
    fw.appendChild(mkImg(c.image, c.caption));
    if (c.caption) fw.appendChild(el('span', 'fullbleed-caption', c.caption));
    s.appendChild(fw);
    main.appendChild(s);
  }

  /* Timeline */
  if (CONFIG.sections.timeline) {
    const c     = CONFIG.content.timeline;
    const s     = el('section', 'timeline-section');
    const ti    = el('div', 'timeline-inner');
    const tb    = el('div', 'text-block');
    if (c.showChapter && c.chapter) tb.appendChild(el('p', 'section-label', c.chapter));
    const th = el('div', 'timeline-header');
    th.appendChild(el('h2', '', c.heading));
    tb.appendChild(th);
    const track = el('div', 'timeline-track');
    c.steps.forEach((step, i) => {
      const spine = el('div', 'timeline-spine');
      spine.appendChild(el('div', 'timeline-node', step.n));
      if (i < c.steps.length - 1) spine.appendChild(el('div', 'timeline-line'));
      const content = el('div', 'timeline-content');
      content.appendChild(el('h3', '', step.title));
      content.appendChild(el('p', '', step.body));
      if (step.image) {
        const si = el('div', 'step-image');
        si.appendChild(mkImg(step.image, step.title));
        content.appendChild(si);
      }
      track.appendChild(spine);
      track.appendChild(content);
    });
    tb.appendChild(track);
    ti.appendChild(tb);
    s.appendChild(ti);
    main.appendChild(s);
  }

  /* Text + image left */
  if (CONFIG.sections.textImageL) {
    const c  = CONFIG.content.textImageL;
    const ti = el('div', 'text-image-left');
    const td = el('div', 'ti-image');
    td.appendChild(mkImg(c.image, c.imageAlt));
    const tt = el('div', 'ti-text');
    tt.appendChild(el('h2', '', c.heading));
    tt.appendChild(el('p', '', c.body));
    ti.appendChild(td); ti.appendChild(tt);
    appendSection(makeTextBlock([ti], c.showChapter, c.chapter));
  }

  /* Annotated / Badge diagram */
  if (CONFIG.sections.annotated) {
    const c = CONFIG.content.annotated;
    const s = document.createElement('section');
    s.className = 'annotated-section';
    const ai = document.createElement('div');
    ai.className = 'annotated-inner';
    const ab = document.createElement('div');
    ab.className = 'annotated-block';

    if (c.showChapter && c.chapter) ab.appendChild(el('p', 'annotated-label', c.chapter));

    /* Ghost badge background */
    if (c.ghostImage) {
      const ghost = document.createElement('div');
      ghost.className = 'badge-ghost';
      ghost.innerHTML = `<img src="${c.ghostImage}" alt="">`;
      ab.appendChild(ghost);
    }

    const diagram = document.createElement('div');
    diagram.className = 'annotated-diagram';

    /* Badge SVG */
    const badgeWrap = document.createElement('div');
    badgeWrap.className = 'badge-svg-wrap';

    const parser = new DOMParser();
    const parsedSvg = parser.parseFromString(c.svgSource, 'image/svg+xml').documentElement;
    parsedSvg.classList.add('badge-svg');

    /* Apply draw-on animation from badgeParts config */
    (c.badgeParts || []).forEach(part => {
      const g = parsedSvg.querySelector('#' + part.id);
      if (!g) return;
      if (part.isFill) {
        g.querySelectorAll('path,rect,line,polyline,polygon').forEach(el => {
          el.classList.add('draw-fill');
          el.style.setProperty('--dd', part.dd + 's');
        });
      } else {
        g.querySelectorAll('path,rect,line,polyline,polygon').forEach(el => {
          el.classList.add('draw-stroke');
          el.style.setProperty('--dl', part.dl);
          el.setAttribute('stroke-dasharray', part.dl);
          el.setAttribute('stroke-dashoffset', part.dl);
          el.style.setProperty('--dd', part.dd + 's');
        });
      }
    });

    badgeWrap.appendChild(parsedSvg);
    diagram.appendChild(badgeWrap);

    /* Callout list */
    const calloutList = document.createElement('div');
    calloutList.className = 'callout-list';
    const floatEls = [];
    c.callouts.forEach((co, i) => {
      const floatEl = document.createElement('div');
      floatEl.className = 'callout-float';
      floatEl.style.transitionDelay = (0.08 * i) + 's';
      floatEl.innerHTML = `<div class="callout-float-label">${co.label}</div><div class="callout-float-desc">${co.desc}</div>`;
      calloutList.appendChild(floatEl);
      floatEls.push(floatEl);
    });

    diagram.appendChild(calloutList);
    ab.appendChild(diagram);
    ai.appendChild(ab);
    s.appendChild(ai);
    main.appendChild(s);

    /* IntersectionObserver: draw badge then reveal labels */
    const badgeObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        parsedSvg.classList.add('drawn');
        setTimeout(() => {
          floatEls.forEach((floatEl, i) => {
            setTimeout(() => floatEl.classList.add('visible'), i * 220);
          });
        }, 2700);
        badgeObserver.unobserve(entry.target);
      });
    }, { threshold: 0.2 });

    badgeObserver.observe(badgeWrap);
  }

  /* Gallery */
  if (CONFIG.sections.gallery) {

    c.items.forEach((item, idx) => {
      const st   = el('div', 'stat');
      st.dataset.target = item.value;

      st.appendChild(iconWrap);

  /* ── Panels ── */
  const P = CONFIG.panels || {};

  if (P.badgeSheet) {
    const s = el('section', 'panel-section');
    const i = el('div', 'section-inner text-block rn-panel');

  if (P.sbsVariants) {

      </div>

    s.appendChild(i); main.appendChild(s);

  if (P.hqComfor) {
    const s = el('section', 'panel-section');
    const i = el('div', 'section-inner text-block hq-panel');

      <div class="hq-intro">

          <div class="hq-item"><div class="hq-item__image-wrap"><img src="images/component-lightning.png" alt="Lightning" loading="lazy"></div><span class="hq-item__label">Lightning</span></div>
          <div class="hq-item"><div class="hq-item__image-wrap"><img src="images/component-dagger.png" alt="Commando Dagger" loading="lazy"></div><span class="hq-item__label">Commando Dagger</span></div>
          <div class="hq-item"><div class="hq-item__image-wrap"><img src="images/component-trident.png" alt="Trident" loading="lazy"></div><span class="hq-item__label">Trident</span></div>

          <div class="hq-item"><div class="hq-item__image-wrap"><img src="images/shield-colourway-2.png" alt="Shield colourway 2" loading="lazy"></div><span class="hq-item__label">Full Colour</span></div>
          <div class="hq-item"><div class="hq-item__image-wrap"><img src="images/shield-colourway-3.png" alt="Shield colourway 3" loading="lazy"></div><span class="hq-item__label">Full Colour</span></div>
        </div>

  if (P.software) {

      { src: "images/AdobeLogo.png",  name: "" },

  /* Footer */

  /* ══════════════════════════════════════════════════════
     SCROLL + VIDEO
     Smooth scrub with fastSeek() where available (Chrome/Firefox).
     rAF loop prevents jank by deferring currentTime writes
     to the next animation frame instead of firing inline
     on every scroll event.
  ══════════════════════════════════════════════════════ */
  const video       = document.getElementById('bg-video');
  const progressBar = document.getElementById('progress-bar');
  const scrollCue   = document.getElementById('scroll-cue');
  const pct         = document.getElementById('progress-pct');
  const loading     = document.getElementById('loading');
  const hudBar      = document.getElementById('hud-bar');

  video.addEventListener('loadedmetadata', () => loading.classList.add('hidden'));
  if (video.readyState >= 1) loading.classList.add('hidden');
  setTimeout(() => loading.classList.add('hidden'), 3000);

  let rafPending    = false;
  let targetTime    = 0;
  let lastProgress  = -1;

  function applyVideoSeek() {
    rafPending = false;
    if (!video.duration || !isFinite(video.duration)) return;
    const diff = Math.abs(video.currentTime - targetTime);
    if (diff < 0.05) return;          /* skip tiny deltas — avoids Chrome jitter */
    if (video.fastSeek) {
      video.fastSeek(targetTime);     /* hardware-accelerated seek where available */
    } else {
      video.currentTime = targetTime;
    }
  }

  function onScroll() {
    const scrollTop = window.scrollY;
    const scrollMax = document.body.scrollHeight - window.innerHeight;
    const progress  = Math.min(Math.max(scrollTop / scrollMax, 0), 1);

    /* Batch UI updates */
    if (video.duration && isFinite(video.duration)) {
      targetTime = progress * video.duration;
      if (!rafPending) {
        rafPending = true;
        requestAnimationFrame(applyVideoSeek);
      }
    }

    if (progress !== lastProgress) {
      video.style.opacity = 1 - (progress * 0.9);
      progressBar.style.width = (progress * 100) + '%';
      pct.textContent = Math.round(progress * 100) + '%';
      lastProgress = progress;
    }

    scrollCue.style.opacity = scrollTop > 40 ? '0' : '1';
    hudBar.classList.toggle('scrolled', scrollTop > 40);
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();

  /* ── Lightbox ── */
  const lb      = document.getElementById('lightbox');
  const lbImg   = document.getElementById('lightbox-img');
  const lbCount = document.getElementById('lightbox-count');
  let current   = 0;

  function getItems() { return Array.from(document.querySelectorAll('.gallery-item')); }

  function openLightbox(i) {
    const items = getItems();
    current = i;
    lbImg.src = items[i].querySelector('img').src;
    lbCount.textContent = (i + 1) + ' / ' + items.length;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  function showSlide(i) {
    const items = getItems();
    current = (i + items.length) % items.length;
    lbImg.src = items[current].querySelector('img').src;
    lbCount.textContent = (current + 1) + ' / ' + items.length;
  }

  document.addEventListener('click', e => {
    const item = e.target.closest('.gallery-item');
    if (item) openLightbox(+item.dataset.index);
  });

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
  document.getElementById('lightbox-prev').addEventListener('click', e => { e.stopPropagation(); showSlide(current - 1); });
  document.getElementById('lightbox-next').addEventListener('click', e => { e.stopPropagation(); showSlide(current + 1); });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') showSlide(current - 1);
    if (e.key === 'ArrowRight') showSlide(current + 1);
  });

  /* ── Stat animation ── */
  function countUp(numEl, target, duration) {
    const isFloat = target % 1 !== 0;
    const start   = performance.now();
    function tick(now) {
      const t    = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      const val  = target * ease;
      numEl.textContent = isFloat ? val.toFixed(1) : Math.round(val);
      if (t < 1) requestAnimationFrame(tick);
      else numEl.textContent = isFloat ? target.toFixed(1) : target;
    }
    requestAnimationFrame(tick);
  }

  const statObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const st    = entry.target;
      const delay = +st.dataset.delay || 0;
      setTimeout(() => {
        st.classList.add('fired');
        const numEl  = st.querySelector('h4');
        const target = parseFloat(numEl.dataset.countTo);
        countUp(numEl, target, 1200);
      }, delay);
      statObserver.unobserve(st);
    });
  }, { threshold: 0.3 });

  /* ── Scroll reveal ── */
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

  requestAnimationFrame(() => {
    document.querySelectorAll(
      '.text-block, .ti-image img, .fullbleed-wrap img, .step-image img, .gallery-item, .timeline-content, .pull-quote'
    ).forEach(el => {
      el.classList.add('reveal');
      revealObserver.observe(el);
    });
    document.querySelectorAll('.stat').forEach(st => statObserver.observe(st));

    /* Panel image + logo reveals */
    document.querySelectorAll('.panel-section img, .sw-logo').forEach((el, i) => {
      el.style.transitionDelay = (i % 4 * 0.12) + 's';
      el.classList.add('reveal');
      revealObserver.observe(el);
    });
  });
  </script>
